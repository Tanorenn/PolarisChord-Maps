<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポラリスコード 譜面保管所</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .song-list {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .song {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .song:hover {
      background: #1a2745;
      border-color: #4a4a7a;
    }
    .song-title { font-size: 15px; }
    .song-count { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <h1>ポラリスコード 譜面</h1>
  <p class="subtitle">Polaris Code Chart Archive</p>
  <div class="song-list">
    <a class="song" href="IX/"><span class="song-title">IX</span><span class="song-count">28 images</span></a>
    <a class="song" href="saiph/"><span class="song-title">saiph</span><span class="song-count">29 images</span></a>
  </div>
</body>
</html>
