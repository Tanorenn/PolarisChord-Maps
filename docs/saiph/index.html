<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>saiph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      position: absolute;
      left: 20px;
    }
    .back-link:hover { color: #ccc; }
    header h1 {
      color: #e0e0e0;
      font-size: 18px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: sans-serif;
      font-size: 13px;
      color: #aaa;
    }
    .zoom-control input[type="range"] {
      width: 100px;
      accent-color: #6c63ff;
    }
    .zoom-value {
      min-width: 40px;
      text-align: center;
      color: #e0e0e0;
    }
    .chart-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: max-width 0.2s;
    }
    .chart-container img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      line-height: 0;
      font-size: 0;
    }
    footer {
      padding: 40px 20px;
      text-align: center;
      color: #555;
      font-size: 12px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <a class="back-link" href="../">← 戻る</a>
    <h1>saiph</h1>
    <div class="zoom-control">
      <span>🔍</span>
      <input type="range" id="zoom" min="10" max="100" value="50">
      <span class="zoom-value" id="zoomVal">50%</span>
    </div>
  </header>
  <div class="chart-container" id="chart">
    <img src="chart_output_002.png" alt="chart_output_002">
    <img src="chart_output_003.png" alt="chart_output_003">
    <img src="chart_output_004.png" alt="chart_output_004">
    <img src="chart_output_005.png" alt="chart_output_005">
    <img src="chart_output_006.png" alt="chart_output_006">
    <img src="chart_output_007.png" alt="chart_output_007">
    <img src="chart_output_008.png" alt="chart_output_008">
    <img src="chart_output_009.png" alt="chart_output_009">
    <img src="chart_output_010.png" alt="chart_output_010">
    <img src="chart_output_011.png" alt="chart_output_011">
    <img src="chart_output_012.png" alt="chart_output_012">
    <img src="chart_output_013.png" alt="chart_output_013">
    <img src="chart_output_014.png" alt="chart_output_014">
    <img src="chart_output_015.png" alt="chart_output_015">
    <img src="chart_output_016.png" alt="chart_output_016">

    <img src="chart_output_023.png" alt="chart_output_023">
    <img src="chart_output_024.png" alt="chart_output_024">
    <img src="chart_output_025.png" alt="chart_output_025">
    <img src="chart_output_026.png" alt="chart_output_026">
    <img src="chart_output_027.png" alt="chart_output_027">
    <img src="chart_output_028.png" alt="chart_output_028">
    <img src="chart_output_029.png" alt="chart_output_029">
    <img src="chart_output_030.png" alt="chart_output_030">
  </div>
  <footer>Generated by Polaris Code Chart Image Generator</footer>
  <script>
    const zoom = document.getElementById('zoom');
    const zoomVal = document.getElementById('zoomVal');
    const chart = document.getElementById('chart');
    // ローカルストレージから復元
    const saved = localStorage.getItem('chart-zoom');
    if (saved) { zoom.value = saved; }
    function applyZoom() {
      const v = zoom.value;
      chart.style.maxWidth = v + '%';
      zoomVal.textContent = v + '%';
      localStorage.setItem('chart-zoom', v);
    }
    zoom.addEventListener('input', applyZoom);
    applyZoom();
  </script>
</body>
</html>
