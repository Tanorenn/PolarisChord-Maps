<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #ccc; }
    header h1 {
      color: #e0e0e0;
      font-size: 18px;
      font-weight: 500;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #aaa;
    }
    .control input[type="range"] {
      width: 80px;
      accent-color: #6c63ff;
    }
    .control-value {
      min-width: 32px;
      text-align: center;
      color: #e0e0e0;
      font-size: 13px;
    }
    .chart-area {
      width: 100%;
      overflow-x: auto;
      padding: 10px;
    }
    .chart-columns {
      display: flex;
      flex-direction: row-reverse; /* 右が最初、左が最後 */
      align-items: flex-start;
      gap: 2px;
      width: fit-content;
      margin: 0 auto;
    }
    .chart-column {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chart-column img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
    }
    .col-label {
      text-align: center;
      color: #666;
      font-size: 11px;
      font-family: sans-serif;
      padding: 4px 0;
    }
    footer {
      padding: 30px 20px;
      text-align: center;
      color: #555;
      font-size: 12px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <a class="back-link" href="../">← 戻る</a>
    <h1>neu</h1>
    <div class="control">
      <span>列数</span>
      <input type="range" id="cols" min="1" max="20" value="10">
      <span class="control-value" id="colsVal">10</span>
    </div>
    <div class="control">
      <span>列幅</span>
      <input type="range" id="colWidth" min="50" max="500" value="120" step="10">
      <span class="control-value" id="colWidthVal">120px</span>
    </div>
  </header>
  <div class="chart-area">
    <div class="chart-columns" id="chart"></div>
  </div>
  <footer>Generated by Polaris Code Chart Image Generator</footer>
  <script>
    const images = ["neu_001.png", "neu_002.png", "neu_003.png", "neu_004.png", "neu_005.png", "neu_006.png", "neu_007.png", "neu_008.png", "neu_009.png", "neu_010.png", "neu_011.png", "neu_012.png", "neu_013.png", "neu_014.png", "neu_015.png", "neu_016.png", "neu_017.png", "neu_018.png", "neu_019.png", "neu_020.png", "neu_021.png", "neu_022.png", "neu_023.png", "neu_024.png", "neu_025.png", "neu_026.png", "neu_027.png", "neu_028.png", "neu_029.png", "neu_030.png", "neu_031.png", "neu_032.png"];
    const chart = document.getElementById('chart');
    const colsSlider = document.getElementById('cols');
    const colsVal = document.getElementById('colsVal');
    const widthSlider = document.getElementById('colWidth');
    const widthVal = document.getElementById('colWidthVal');

    // ローカルストレージから復元
    const savedCols = localStorage.getItem('chart-cols');
    const savedWidth = localStorage.getItem('chart-col-width');
    if (savedCols) colsSlider.value = savedCols;
    if (savedWidth) widthSlider.value = savedWidth;

    function render() {
      const numCols = parseInt(colsSlider.value);
      const colW = parseInt(widthSlider.value);

      colsVal.textContent = numCols;
      widthVal.textContent = colW + 'px';
      localStorage.setItem('chart-cols', numCols);
      localStorage.setItem('chart-col-width', colW);

      // 画像を列に分配
      const perCol = Math.ceil(images.length / numCols);
      chart.innerHTML = '';

      for (let c = 0; c < numCols; c++) {
        const start = c * perCol;
        const end = Math.min(start + perCol, images.length);
        if (start >= images.length) break;

        const col = document.createElement('div');
        col.className = 'chart-column';
        col.style.width = colW + 'px';

        for (let i = start; i < end; i++) {
          const img = document.createElement('img');
          img.src = images[i];
          img.alt = 'chart ' + (i + 1);
          img.loading = 'lazy';
          col.appendChild(img);
        }

        chart.appendChild(col);
      }
    }

    colsSlider.addEventListener('input', render);
    widthSlider.addEventListener('input', render);
    render();
  </script>
</body>
</html>
