<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Family Liviing In Graveyard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #ccc; }
    header h1 {
      color: #e0e0e0;
      font-size: 18px;
      font-weight: 500;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #aaa;
    }
    .control input[type="range"] {
      width: 80px;
      accent-color: #6c63ff;
    }
    .control-value {
      min-width: 32px;
      text-align: center;
      color: #e0e0e0;
      font-size: 13px;
    }
    .mirror-btn {
      background: #2a2a4a;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .mirror-btn:hover { background: #3a3a5a; color: #e0e0e0; }
    .mirror-btn.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    .chart-area {
      width: 100%;
      overflow-x: auto;
      padding: 10px;
    }
    .chart-columns {
      display: flex;
      flex-direction: row-reverse; /* 右が最初、左が最後 */
      align-items: flex-start;
      gap: 2px;
      width: fit-content;
      margin: 0 auto;
    }
    .chart-column {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chart-column img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
    }
    .col-label {
      text-align: center;
      color: #666;
      font-size: 11px;
      font-family: sans-serif;
      padding: 4px 0;
    }
    footer {
      padding: 30px 20px;
      text-align: center;
      color: #555;
      font-size: 12px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <a class="back-link" href="../">← 戻る</a>
    <h1>Ghost Family Liviing In Graveyard</h1>
    <div class="control">
      <span>列数</span>
      <input type="range" id="cols" min="1" max="50" value="10">
      <span class="control-value" id="colsVal">10</span>
    </div>
    <div class="control">
      <span>列幅</span>
      <input type="range" id="colWidth" min="30" max="500" value="120" step="10">
      <span class="control-value" id="colWidthVal">120px</span>
    </div>
    <button class="mirror-btn" id="mirrorBtn">🪞 ミラー</button>
  </header>
  <div class="chart-area">
    <div class="chart-columns" id="chart"></div>
  </div>
  <footer>Generated by Polaris Code Chart Image Generator</footer>
  <script>
    const images = ["Ghost Family Liviing In Graveyard_001.png", "Ghost Family Liviing In Graveyard_002.png", "Ghost Family Liviing In Graveyard_003.png", "Ghost Family Liviing In Graveyard_004.png", "Ghost Family Liviing In Graveyard_005.png", "Ghost Family Liviing In Graveyard_006.png", "Ghost Family Liviing In Graveyard_007.png", "Ghost Family Liviing In Graveyard_008.png", "Ghost Family Liviing In Graveyard_009.png", "Ghost Family Liviing In Graveyard_010.png", "Ghost Family Liviing In Graveyard_011.png", "Ghost Family Liviing In Graveyard_012.png", "Ghost Family Liviing In Graveyard_013.png", "Ghost Family Liviing In Graveyard_014.png", "Ghost Family Liviing In Graveyard_015.png", "Ghost Family Liviing In Graveyard_016.png", "Ghost Family Liviing In Graveyard_017.png", "Ghost Family Liviing In Graveyard_018.png", "Ghost Family Liviing In Graveyard_019.png", "Ghost Family Liviing In Graveyard_020.png", "Ghost Family Liviing In Graveyard_021.png", "Ghost Family Liviing In Graveyard_022.png", "Ghost Family Liviing In Graveyard_023.png", "Ghost Family Liviing In Graveyard_024.png", "Ghost Family Liviing In Graveyard_025.png", "Ghost Family Liviing In Graveyard_026.png", "Ghost Family Liviing In Graveyard_027.png", "Ghost Family Liviing In Graveyard_028.png", "Ghost Family Liviing In Graveyard_029.png", "Ghost Family Liviing In Graveyard_030.png", "Ghost Family Liviing In Graveyard_031.png", "Ghost Family Liviing In Graveyard_032.png"];
    const chart = document.getElementById('chart');
    const colsSlider = document.getElementById('cols');
    const colsVal = document.getElementById('colsVal');
    const widthSlider = document.getElementById('colWidth');
    const widthVal = document.getElementById('colWidthVal');
    const mirrorBtn = document.getElementById('mirrorBtn');

    let mirrored = false;

    // ローカルストレージから復元
    const savedCols = localStorage.getItem('chart-cols');
    const savedWidth = localStorage.getItem('chart-col-width');
    const savedMirror = localStorage.getItem('chart-mirror');
    if (savedCols) colsSlider.value = savedCols;
    if (savedWidth) widthSlider.value = savedWidth;
    if (savedMirror === 'true') mirrored = true;

    function updateMirror() {
      mirrorBtn.classList.toggle('active', mirrored);
      const imgs = chart.querySelectorAll('img');
      imgs.forEach(img => {
        img.style.transform = mirrored ? 'scaleX(-1)' : '';
      });
      localStorage.setItem('chart-mirror', mirrored);
    }

    mirrorBtn.addEventListener('click', () => {
      mirrored = !mirrored;
      updateMirror();
    });

    function render() {
      const numCols = parseInt(colsSlider.value);
      const colW = parseInt(widthSlider.value);

      colsVal.textContent = numCols;
      widthVal.textContent = colW + 'px';
      localStorage.setItem('chart-cols', numCols);
      localStorage.setItem('chart-col-width', colW);

      // 画像を列に分配
      const perCol = Math.ceil(images.length / numCols);
      chart.innerHTML = '';

      for (let c = 0; c < numCols; c++) {
        const start = c * perCol;
        const end = Math.min(start + perCol, images.length);
        if (start >= images.length) break;

        const col = document.createElement('div');
        col.className = 'chart-column';
        col.style.width = colW + 'px';

        for (let i = start; i < end; i++) {
          const img = document.createElement('img');
          img.src = images[i];
          img.alt = 'chart ' + (i + 1);
          img.loading = 'lazy';
          col.appendChild(img);
        }

        chart.appendChild(col);
      }
      updateMirror();
    }

    colsSlider.addEventListener('input', render);
    widthSlider.addEventListener('input', render);
    render();
  </script>
</body>
</html>
